<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快消行策 · 行业报告库</title>
<style>
  :root {
    --red: #FF2442;
    --red-light: #fff0f2;
    --gray-bg: #f5f5f7;
    --gray-border: #e0e0e0;
    --text: #1a1a1a;
    --text-sub: #666;
    --tag-bg: #f0f0f0;
    --insight-bg: #fffbf0;
    --card-radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--gray-bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: white;
    border-bottom: 1px solid var(--gray-border);
    padding: 0 28px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 58px;
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    color: var(--red);
    white-space: nowrap;
    text-decoration: none;
  }
  .nav-links {
    display: flex;
    gap: 4px;
  }
  .nav-link {
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-sub);
    text-decoration: none;
    transition: background 0.15s;
  }
  .nav-link:hover { background: var(--gray-bg); color: var(--text); }
  .nav-link.active { background: var(--red-light); color: var(--red); font-weight: 600; }

  .search-wrap {
    flex: 1;
    max-width: 340px;
    margin-left: auto;
  }
  .search-wrap input {
    width: 100%;
    padding: 7px 14px;
    border: 1px solid var(--gray-border);
    border-radius: 20px;
    font-size: 13px;
    outline: none;
    background: var(--gray-bg);
  }
  .search-wrap input:focus { border-color: var(--red); background: white; }
  .stats {
    font-size: 12px;
    color: var(--text-sub);
    white-space: nowrap;
  }
  .stats span { color: var(--red); font-weight: 700; }

  /* ── Layout ── */
  .layout {
    display: flex;
    max-width: 1240px;
    margin: 0 auto;
    padding: 24px 20px;
    gap: 22px;
    align-items: flex-start;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 210px;
    flex-shrink: 0;
    position: sticky;
    top: 78px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .sidebar-box {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--gray-border);
    overflow: hidden;
  }
  .sidebar-title {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 1px solid var(--gray-border);
    background: var(--gray-bg);
  }
  .filter-item {
    padding: 9px 14px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--gray-border);
    transition: background 0.1s;
  }
  .filter-item:last-child { border-bottom: none; }
  .filter-item:hover { background: var(--gray-bg); }
  .filter-item.active { background: var(--red-light); color: var(--red); font-weight: 600; }
  .filter-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-sub);
    background: var(--tag-bg);
    padding: 1px 6px;
    border-radius: 10px;
  }
  .filter-item.active .filter-count { background: var(--red); color: white; }
  .filter-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }

  /* ── Main ── */
  .main { flex: 1; min-width: 0; }

  /* Industry tab bar */
  .tab-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 7px 18px;
    border-radius: 22px;
    border: 1px solid var(--gray-border);
    background: white;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    color: var(--text-sub);
  }
  .tab-btn:hover { border-color: var(--red); color: var(--red); }
  .tab-btn.active {
    background: var(--red);
    color: white;
    border-color: var(--red);
    font-weight: 700;
  }

  /* Hero banner */
  .hero {
    background: linear-gradient(135deg, #0f1b2d 0%, #1a3a5c 60%, #0a2a4a 100%);
    border-radius: 16px;
    padding: 22px 26px;
    color: white;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    top: -50px; right: -50px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,36,66,0.12);
    pointer-events: none;
  }
  .hero-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .hero-title {
    font-size: 16px;
    font-weight: 700;
    color: white;
    margin-bottom: 12px;
  }
  .hero-points {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-bottom: 14px;
  }
  .hero-point {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    line-height: 1.5;
  }
  .hero-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--red);
    margin-top: 7px;
    flex-shrink: 0;
  }
  .hero-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .hero-tag {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
  }
  .hero-tag.hot {
    background: rgba(255,36,66,0.2);
    border-color: rgba(255,36,66,0.35);
    color: #ff9aaa;
  }

  /* ── Report Card ── */
  .card-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  .report-card {
    background: white;
    border: 1px solid var(--gray-border);
    border-radius: var(--card-radius);
    overflow: hidden;
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .report-card:hover {
    box-shadow: 0 6px 24px rgba(0,0,0,0.09);
    transform: translateY(-1px);
  }
  .report-card.hidden { display: none; }

  .card-top {
    padding: 16px 18px 12px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .card-logo {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    font-weight: 700;
  }

  /* Institution color themes */
  .logo-kpmg    { background: #0033a0; color: white; font-size: 11px; }
  .logo-deloitte { background: #86bc25; color: white; font-size: 11px; }
  .logo-bcg     { background: #1d3461; color: white; font-size: 11px; }
  .logo-iresearch { background: #e63329; color: white; font-size: 11px; }
  .logo-nielseniq { background: #00b2a9; color: white; font-size: 11px; }
  .logo-cbndata  { background: #1a1a2e; color: white; font-size: 11px; }
  .logo-euromonitor { background: #004b87; color: white; font-size: 11px; }
  .logo-mintel  { background: #9e1f63; color: white; font-size: 11px; }
  .logo-iimedia { background: #ff6600; color: white; font-size: 11px; }
  .logo-jpmorgan { background: #003087; color: white; font-size: 11px; }
  .logo-36kr    { background: #ff6400; color: white; font-size: 11px; }
  .logo-foodaily { background: #00a86b; color: white; font-size: 11px; }
  .logo-派读    { background: #5b4fcf; color: white; font-size: 11px; }
  .logo-other   { background: #555; color: white; font-size: 11px; }

  .card-meta { flex: 1; min-width: 0; }
  .card-institution {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-sub);
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-date {
    font-size: 10px;
    color: #aaa;
    background: var(--tag-bg);
    padding: 1px 7px;
    border-radius: 8px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .card-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--tag-bg);
    color: var(--text-sub);
    border: 1px solid var(--gray-border);
  }
  .card-tag.industry-tag {
    background: var(--red-light);
    color: var(--red);
    border-color: #ffccd3;
    font-weight: 600;
  }

  .card-body {
    padding: 0 18px 14px;
    border-top: 1px solid var(--gray-border);
  }
  .card-summary {
    font-size: 13px;
    line-height: 1.75;
    color: #333;
    padding: 12px 0 10px;
  }

  /* Key findings */
  .findings {
    background: var(--insight-bg);
    border-left: 3px solid #f0c040;
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    margin-bottom: 10px;
  }
  .findings-title {
    font-size: 11px;
    font-weight: 700;
    color: #b8860b;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .findings ul {
    margin: 0 0 0 14px;
    padding: 0;
  }
  .findings li {
    font-size: 12.5px;
    line-height: 1.65;
    color: #444;
    margin-bottom: 4px;
  }

  /* Sales insight */
  .sales-insight {
    background: #f0f4ff;
    border-left: 3px solid #5c85d6;
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
  }
  .sales-insight-title {
    font-size: 11px;
    font-weight: 700;
    color: #1565c0;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .sales-insight p {
    font-size: 12.5px;
    line-height: 1.65;
    color: #333;
    margin: 0;
  }

  .card-footer {
    padding: 10px 18px;
    border-top: 1px solid var(--gray-border);
    background: var(--gray-bg);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: var(--text-sub);
  }
  .report-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-left: auto;
    color: var(--red);
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border: 1px solid #ffccd3;
    border-radius: 20px;
    background: var(--red-light);
    transition: all 0.15s;
  }
  .report-link:hover { background: var(--red); color: white; border-color: var(--red); }

  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-sub);
    font-size: 14px;
  }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .layout { padding: 12px; }
    .hero { padding: 16px; }
    header { padding: 0 16px; gap: 12px; }
    .stats { display: none; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">📊 快消行策</a>

      </div>
      <div class="filter-item" data-inst="CBNData" onclick="setInst(this,'CBNData')">

        <span class="filter-count" id="cnt-inst-CBNData">0</span>
      </div>
      <div class="filter-item" data-inst="其他" onclick="setInst(this,'其他')">
        <span class="filter-dot" style="background:#888"></span>其他机构
        <span class="filter-count" id="cnt-inst-其他">0</span>
      </div>
    </div>

    <div class="sidebar-box">
      <div class="sidebar-title">报告类型</div>
      <div class="filter-item active" data-type="all" onclick="setType(this,'all')">
        全部类型
        <span class="filter-count" id="cnt-type-all">0</span>
      </div>
      <div class="filter-item" data-type="市场规模" onclick="setType(this,'市场规模')">
        📈 市场规模
        <span class="filter-count" id="cnt-type-市场规模">0</span>
      </div>
      <div class="filter-item" data-type="消费者洞察" onclick="setType(this,'消费者洞察')">
        👥 消费者洞察
        <span class="filter-count" id="cnt-type-消费者洞察">0</span>
      </div>
      <div class="filter-item" data-type="行业趋势" onclick="setType(this,'行业趋势')">
        🔭 行业趋势
        <span class="filter-count" id="cnt-type-行业趋势">0</span>
      </div>
      <div class="filter-item" data-type="竞争格局" onclick="setType(this,'竞争格局')">

      </div>
      <div class="filter-item" data-type="细分赛道" onclick="setType(this,'细分赛道')">
        🎯 细分赛道
        <span class="filter-count" id="cnt-type-细分赛道">0</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="tab-bar">
      <button class="tab-btn active" data-ind="all" onclick="setInd(this,'all')">全部行业</button>
      <button class="tab-btn" data-ind="母婴" onclick="setInd(this,'母婴')">🍼 母婴</button>
      <button class="tab-btn" data-ind="宠物" onclick="setInd(this,'宠物')">🐾 宠物</button>
      <button class="tab-btn" data-ind="大健康" onclick="setInd(this,'大健康')">💊 大健康</button>
      <button class="tab-btn" data-ind="食品饮料" onclick="setInd(this,'食品饮料')">🥤 食品饮料</button>
    </div>

    <div id="heroBanner"></div>
    <div id="cardGrid" class="card-grid"></div>
    <div id="noResults" class="no-results" style="display:none">暂无符合条件的报告</div>
  </main>
</div>

let activeInst = 'all';
let activeType = 'all';
let activeInd = 'all';

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
function renderCards() {
  const container = document.getElementById('cardGrid');
  container.innerHTML = '';

  const query = document.getElementById('searchInput').value.trim().toLowerCase();

  let visible = 0;
  const counts = {
    inst: { 'all': 0 },
    type: { 'all': 0 },
    ind: { 'all': 0 }
  };
  REPORTS.forEach(r => { counts.inst[r.instKey] = 0; counts.type[r.type] = 0; });

  REPORTS.forEach(item => {
    // Count filters
    counts.inst.all++;
    counts.inst[item.instKey]++;
    counts.type.all++;
    counts.type[item.type] = (counts.type[item.type] || 0) + 1;
    item.industry.forEach(ind => counts.ind[ind] = (counts.ind[ind] || 0) + 1);

    // Filter logic
    const instMatch = activeInst === 'all' || item.instKey === activeInst;
    const typeMatch = activeType === 'all' || item.type === activeType;
    const indMatch = activeInd === 'all' || item.industry.includes(activeInd);

    const searchStr = (item.title + item.institution + item.summary + item.tags.join(' ')).toLowerCase();
    const searchMatch = !query || searchStr.includes(query);

    if (instMatch && typeMatch && indMatch && searchMatch) {
      visible++;
      container.appendChild(buildCard(item));
    }
  });

  // Update counts
  Object.keys(counts.inst).forEach(k => {
    const el = document.getElementById('cnt-inst-' + k);
    if (el) el.textContent = counts.inst[k] || 0;
  });
  Object.keys(counts.type).forEach(k => {
    const el = document.getElementById('cnt-type-' + k);
    if (el) el.textContent = counts.type[k] || 0;
  });

  document.getElementById('visibleCount').textContent = visible;
  document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
}

function buildCard(item) {
  const div = document.createElement('div');
  div.className = 'report-card';

  const industryTags = item.industry.map(i => `<span class="card-tag industry-tag">${i}</span>`).join('');
  const otherTags = item.tags.slice(0, 3).map(t => `<span class="card-tag">${t}</span>`).join('');
  const findingsHtml = item.findings.map(f => `<li>${f}</li>`).join('');

  div.innerHTML = `
    <div class="card-top">
      <div class="card-logo ${item.instClass}">${item.instShort}</div>
      <div class="card-meta">
        <div class="card-institution">${item.institution}<span class="card-date">${item.date}</span></div>
        <div class="card-title">${item.title}</div>
        <div class="card-tags">${industryTags}${otherTags}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-summary">${item.summary}</div>
      <div class="findings">
        <div class="findings-title">📊 核心结论</div>
        <ul>${findingsHtml}</ul>
      </div>
      <div class="sales-insight">
        <div class="sales-insight-title">💡 给销售的Insight</div>
        <p>${item.salesInsight}</p>
      </div>
    </div>
    <div class="card-footer">
      <span style="background:var(--red-light);color:var(--red);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;">${item.type}</span>
      <a class="report-link" href="${item.url}" target="_blank">查看报告 →</a>
    </div>
  `;
  return div;
}

      '🛒 即时零售2035年预计3万亿，食品饮料是第一大品类（35%+）',
      '🎯 新锐品牌内容投入是大品牌3倍，内容成为增长分水岭'
    ],
    tags: ['毕马威', '德勤', '艾瑞', '即时零售', '功能饮料', '渠道变革']
  }
};

function renderHero() {
  const hero = document.getElementById('heroBanner');
  const data = HERO[activeInd] || HERO.all;

  const pointsHtml = data.points.map(p => `<div class="hero-point"><div class="hero-dot"></div><span>${p}</span></div>`).join('');
  const tagsHtml = data.tags.map((t, i) => `<span class="hero-tag${i < 2 ? ' hot' : ''}">${t}</span>`).join('');

  hero.innerHTML = `
    <div class="hero">
      <div class="hero-label">${data.label}</div>
      <div class="hero-title">${data.title}</div>
      <div class="hero-points">${pointsHtml}</div>
      <div class="hero-tags">${tagsHtml}</div>
    </div>`;
}

function setInst(el, val) {
  activeInst = val;
  document.querySelectorAll('[data-inst]').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function setType(el, val) {
  activeType = val;
  document.querySelectorAll('[data-type]').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function setInd(el, val) {
  activeInd = val;
  document.querySelectorAll('[data-ind]').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  renderCards();
  renderHero();
}

// Init
renderCards();
renderHero();
</script>
</body>
</html>
