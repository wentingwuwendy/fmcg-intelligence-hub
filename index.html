<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快消行策 · 行业报告库</title>
<style>
  :root { --red:#FF2442; --red-light:#fff0f2; --gray-bg:#f5f5f7; --gray-border:#e0e0e0; --text:#1a1a1a; --text-sub:#666; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background:var(--gray-bg); color:var(--text); font-size:14px; line-height:1.6; }

  header { background:white; border-bottom:1px solid var(--gray-border); padding:0 28px; position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:20px; height:58px; }
  .logo { font-size:15px; font-weight:700; color:var(--red); text-decoration:none; white-space:nowrap; }
  .nav-links { display:flex; gap:4px; }
  .nav-link { padding:5px 12px; border-radius:8px; font-size:13px; color:var(--text-sub); text-decoration:none; }
  .nav-link:hover { background:var(--gray-bg); color:var(--text); }
  .nav-link.active { background:var(--red-light); color:var(--red); font-weight:600; }
  #navAnnLink { color:#b8860b; }
  #navAnnLink:hover { background:#fef9ec; color:#92660a; }
  #navAnnLink.active { background:#fef3c7; color:#92660a; font-weight:600; }
  #navGcLink { color:#7c3aed; }
  #navGcLink:hover { background:#f5f3ff; color:#5b21b6; }
  #navGcLink.active { background:#ede9fe; color:#5b21b6; font-weight:600; }

  /* ── 友商GoodCase 样式 ── */
  .gc-header { background:white; border:1px solid #c4b5fd; border-radius:14px; padding:16px 20px; margin-bottom:16px; display:flex; align-items:center; gap:12px; }
  .gc-header-icon { font-size:24px; }
  .gc-header-text h3 { font-size:14px; font-weight:700; color:#5b21b6; }
  .gc-header-text p { font-size:12px; color:#888; margin-top:2px; }
  .gc-stats { margin-left:auto; display:flex; gap:16px; text-align:center; }
  .gc-stat-val { font-size:18px; font-weight:700; color:#7c3aed; }
  .gc-stat-label { font-size:10px; color:#aaa; }

  .gc-filter-bar { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .gc-filter-btn { padding:5px 14px; border-radius:16px; border:1px solid var(--gray-border); background:white; font-size:12px; color:#666; cursor:pointer; transition:all 0.15s; }
  .gc-filter-btn:hover { border-color:#7c3aed; color:#7c3aed; }
  .gc-filter-btn.active { background:#7c3aed; color:white; border-color:#7c3aed; }

  .gc-grid { display:grid; grid-template-columns:1fr; gap:12px; }
  .gc-card { background:white; border:1px solid var(--gray-border); border-radius:14px; overflow:hidden; transition:box-shadow 0.15s,transform 0.15s; border-left:3px solid #7c3aed; }
  .gc-card:hover { box-shadow:0 6px 24px rgba(124,58,237,0.1); transform:translateY(-1px); }
  .gc-card-top { padding:14px 16px 10px; display:flex; align-items:flex-start; gap:12px; }
  .gc-platform-badge { display:flex; align-items:center; gap:6px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; flex-shrink:0; }
  .gc-card-meta { flex:1; min-width:0; }
  .gc-card-title { font-size:15px; font-weight:700; color:var(--text); line-height:1.4; margin-bottom:6px; }
  .gc-card-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:4px; }
  .gc-tag { font-size:10px; padding:2px 8px; border-radius:10px; background:#f5f3ff; color:#7c3aed; border:1px solid #ddd6fe; }
  .gc-tag.client-tag { background:#fff0f2; color:var(--red); border-color:#ffccd3; font-weight:600; }
  .gc-card-body { padding:0 16px 14px; border-top:1px solid var(--gray-border); }
  .gc-summary { font-size:13px; line-height:1.75; color:#333; padding:10px 0 8px; }
  .gc-result { background:#f0fdf4; border-left:3px solid #22c55e; border-radius:0 8px 8px 0; padding:8px 12px; margin-bottom:8px; }
  .gc-result-title { font-size:11px; font-weight:700; color:#15803d; margin-bottom:5px; }
  .gc-result ul { margin:0 0 0 14px; }
  .gc-result li { font-size:12.5px; line-height:1.65; color:#444; margin-bottom:3px; }
  .gc-learn { background:#f5f3ff; border-left:3px solid #7c3aed; border-radius:0 8px 8px 0; padding:8px 12px; }
  .gc-learn-title { font-size:11px; font-weight:700; color:#5b21b6; margin-bottom:5px; }
  .gc-learn p { font-size:12.5px; line-height:1.65; color:#444; }
  .gc-card-footer { padding:8px 16px; border-top:1px solid var(--gray-border); background:var(--gray-bg); display:flex; align-items:center; gap:8px; }
  .gc-industry-tag { font-size:11px; color:#888; background:#f0f0f0; padding:2px 8px; border-radius:8px; }
  .gc-date { font-size:11px; color:#aaa; margin-left:4px; }
  .gc-link { margin-left:auto; color:#7c3aed; text-decoration:none; font-size:12px; font-weight:600; padding:4px 14px; border:1px solid #c4b5fd; border-radius:16px; background:#f5f3ff; }
  .gc-link:hover { background:#7c3aed; color:white; }
  .search-wrap { flex:1; max-width:360px; margin-left:auto; }
  .search-wrap input { width:100%; padding:7px 14px; border:1px solid var(--gray-border); border-radius:20px; font-size:13px; outline:none; background:var(--gray-bg); }
  .search-wrap input:focus { border-color:var(--red); background:white; }
  .stats { font-size:12px; color:var(--text-sub); white-space:nowrap; }
  .stats span { color:var(--red); font-weight:700; }

  .page { max-width:960px; margin:0 auto; padding:24px 20px 60px; }

  .tab-bar { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .tab-btn { padding:8px 20px; border-radius:22px; border:1px solid var(--gray-border); background:white; cursor:pointer; font-size:13px; font-weight:500; color:var(--text-sub); transition:all 0.15s; }
  .tab-btn:hover { border-color:var(--red); color:var(--red); }
  .tab-btn.active { background:var(--red); color:white; border-color:var(--red); font-weight:700; }

  /* 近期行业趋势 Overview */
  .overview { background:white; border:1px solid var(--gray-border); border-radius:16px; padding:20px 24px; margin-bottom:22px; }
  .overview-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .overview-title { font-size:14px; font-weight:700; color:var(--text); }
  .overview-badge { background:var(--red); color:white; font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
  .overview-date { font-size:11px; color:var(--text-sub); margin-left:auto; }
  .trend-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .trend-item { background:var(--gray-bg); border-radius:10px; padding:12px 14px; }
  .trend-ind { font-size:11px; font-weight:700; color:var(--text-sub); margin-bottom:6px; display:flex; align-items:center; gap:5px; }
  .trend-bullet { display:flex; flex-direction:column; gap:5px; }
  .trend-line { display:flex; align-items:flex-start; gap:6px; font-size:12px; color:#333; line-height:1.5; }
  .trend-dot { width:4px; height:4px; border-radius:50%; margin-top:6px; flex-shrink:0; }
  .dot-red { background:var(--red); }
  .dot-green { background:#22c55e; }
  .dot-blue { background:#3b82f6; }
  .dot-orange { background:#f97316; }

  .card-grid { display:grid; grid-template-columns:1fr; gap:14px; }
  .report-card { background:white; border:1px solid var(--gray-border); border-radius:14px; overflow:hidden; transition:box-shadow 0.15s,transform 0.15s; }
  .report-card:hover { box-shadow:0 6px 24px rgba(0,0,0,0.09); transform:translateY(-1px); }
  .card-top { padding:16px 18px 12px; display:flex; gap:14px; align-items:flex-start; }
  .card-logo { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; color:white; }
  .logo-kpmg { background:#0033a0; }
  .logo-dfcfw { background:#c0392b; }
  .logo-niq { background:#00b2a9; }
  .logo-mktindex { background:#7c3aed; }
  .logo-mofcom { background:#1565c0; }
  .card-meta { flex:1; min-width:0; }
  .card-institution { font-size:11px; font-weight:600; color:var(--text-sub); margin-bottom:3px; display:flex; align-items:center; gap:6px; }
  .card-date { font-size:10px; color:#aaa; background:#f0f0f0; padding:1px 7px; border-radius:8px; }
  .card-title { font-size:15px; font-weight:700; line-height:1.4; color:var(--text); margin-bottom:7px; }
  .card-tags { display:flex; flex-wrap:wrap; gap:4px; }
  .card-tag { font-size:10px; padding:2px 8px; border-radius:10px; background:#f0f0f0; color:var(--text-sub); border:1px solid var(--gray-border); }
  .card-tag.industry-tag { background:var(--red-light); color:var(--red); border-color:#ffccd3; font-weight:600; }
  .card-body { padding:0 18px 14px; border-top:1px solid var(--gray-border); }
  .card-summary { font-size:13px; line-height:1.75; color:#333; padding:12px 0 10px; }
  .findings { background:#fffbf0; border-left:3px solid #f0c040; border-radius:0 8px 8px 0; padding:10px 14px; margin-bottom:10px; }
  .findings-title { font-size:11px; font-weight:700; color:#b8860b; margin-bottom:6px; }
  .findings ul { margin:0 0 0 14px; }
  .findings li { font-size:12.5px; line-height:1.65; color:#444; margin-bottom:4px; }
  .sales-insight { background:#f0f4ff; border-left:3px solid #5c85d6; border-radius:0 8px 8px 0; padding:10px 14px; }
  .sales-insight-title { font-size:11px; font-weight:700; color:#1565c0; margin-bottom:5px; }
  .sales-insight p { font-size:12.5px; line-height:1.65; color:#333; }
  .card-footer { padding:10px 18px; border-top:1px solid var(--gray-border); background:var(--gray-bg); display:flex; align-items:center; }
  .type-badge { background:var(--red-light); color:var(--red); padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .pdf-badge { margin-left:8px; background:#fee2e2; color:#b91c1c; padding:2px 7px; border-radius:10px; font-size:10px; font-weight:700; }
  .report-link { margin-left:auto; color:var(--red); text-decoration:none; font-size:12px; font-weight:600; padding:5px 14px; border:1px solid #ffccd3; border-radius:20px; background:var(--red-light); }
  .report-link:hover { background:var(--red); color:white; }
  .no-results { text-align:center; padding:80px 20px; color:var(--text-sub); }

  /* ── 客户年报 Tab 样式 ── */
  .ann-header { background:white; border:1px solid #e2b000; border-radius:14px; padding:16px 20px; margin-bottom:16px; display:flex; align-items:center; gap:12px; }
  .ann-header-icon { font-size:24px; }
  .ann-header-text h3 { font-size:14px; font-weight:700; color:#b8860b; }
  .ann-header-text p { font-size:12px; color:#888; margin-top:2px; }
  .ann-stats { margin-left:auto; display:flex; gap:16px; text-align:center; }
  .ann-stat-val { font-size:18px; font-weight:700; color:#b8860b; }
  .ann-stat-label { font-size:10px; color:#aaa; }
  .ann-grid { display:grid; grid-template-columns:1fr; gap:10px; }
  .ann-card { background:white; border:1px solid var(--gray-border); border-radius:12px; overflow:hidden; display:flex; align-items:stretch; transition:box-shadow 0.15s; }
  .ann-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.08); }
  .ann-card.disclosed { border-left:3px solid #16a34a; }
  .ann-card.pending { border-left:3px solid #d97706; }
  .ann-status-bar { width:6px; flex-shrink:0; }
  .ann-status-bar.green { background:#16a34a; }
  .ann-status-bar.amber { background:#d97706; }
  .ann-body { flex:1; padding:12px 16px; }
  .ann-top { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .ann-name { font-size:15px; font-weight:700; color:var(--text); }
  .ann-code { font-size:11px; color:#aaa; background:#f0f0f0; padding:1px 7px; border-radius:8px; }
  .ann-exchange { font-size:10px; color:#666; }
  .ann-badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; margin-left:auto; }
  .ann-badge.disclosed { background:#dcfce7; color:#16a34a; }
  .ann-badge.pending { background:#fef3c7; color:#d97706; }
  .ann-meta { display:flex; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .ann-meta-item { font-size:11px; color:#555; }
  .ann-meta-item span { color:var(--red); font-weight:600; }
  .ann-summary { font-size:12.5px; line-height:1.65; color:#444; margin-bottom:8px; }
  .ann-insight { background:#fffbf0; border-left:3px solid #f0c040; border-radius:0 6px 6px 0; padding:8px 12px; font-size:12px; color:#555; line-height:1.6; margin-bottom:8px; }
  .ann-insight b { color:#b8860b; }
  .ann-footer { padding:8px 16px; border-top:1px solid var(--gray-border); background:var(--gray-bg); display:flex; align-items:center; gap:8px; }
  .ann-cat { font-size:11px; color:#888; background:#f0f0f0; padding:2px 8px; border-radius:8px; }
  .ann-link { margin-left:auto; font-size:12px; font-weight:600; padding:4px 14px; border-radius:16px; text-decoration:none; }
  .ann-link.pdf { color:#16a34a; border:1px solid #bbf7d0; background:#f0fdf4; }
  .ann-link.pdf:hover { background:#16a34a; color:white; }
  .ann-link.cninfo { color:#d97706; border:1px solid #fde68a; background:#fffbeb; }
  .ann-link.cninfo:hover { background:#d97706; color:white; }
  .ann-filter-bar { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .ann-filter-btn { padding:5px 14px; border-radius:16px; border:1px solid var(--gray-border); background:white; font-size:12px; color:#666; cursor:pointer; }
  .ann-filter-btn.active { background:#b8860b; color:white; border-color:#b8860b; }

  @media(max-width:640px) { .page{padding:12px 12px 40px;} header{padding:0 14px;gap:10px;} .stats{display:none;} .trend-grid{grid-template-columns:1fr;} .ann-stats{display:none;} }
</style>
</head>
<body>
<header>
  <a class="logo" href="index.html">📊 快消行策</a>
  <nav class="nav-links">

</header>

<div class="page">

  <div id="cardGrid" class="card-grid"></div>
  <div id="noResults" class="no-results" style="display:none">暂无符合条件的报告</div>
</div>

function renderCards() {
  const container = document.getElementById('cardGrid');
  container.innerHTML = '';
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  let visible = 0;
  const filtered = REPORTS.filter(item => {
    const indMatch = activeInd === 'all' || item.industry.includes(activeInd);
    const srch = (item.title + item.institution + item.summary + (item.tags||[]).join(' ')).toLowerCase();
    return indMatch && (!query || srch.includes(query));
  });
  sortedReports(filtered).forEach(item => { visible++; container.appendChild(buildCard(item)); });
  document.getElementById('visibleCount').textContent = visible;
  document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
}

function buildCard(item) {
  const div = document.createElement('div');
  div.className = 'report-card';
  const indTags = item.industry.map(i => `<span class="card-tag industry-tag">${i}</span>`).join('');
  const otherTags = (item.tags||[]).slice(0,3).map(t => `<span class="card-tag">${t}</span>`).join('');
  const findingsHtml = (item.findings||[]).map(f => `<li>${f}</li>`).join('');
  div.innerHTML = `
    <div class="card-top">
      <div class="card-logo ${item.instClass}">${item.instShort}</div>
      <div class="card-meta">
        <div class="card-institution">${item.institution}<span class="card-date">${item.date}</span></div>
        <div class="card-title">${item.title}</div>
        <div class="card-tags">${indTags}${otherTags}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-summary">${item.summary}</div>
      <div class="findings"><div class="findings-title">📊 核心结论</div><ul>${findingsHtml}</ul></div>
      <div class="sales-insight"><div class="sales-insight-title">💡 对客 Insight</div><p>${item.salesInsight}</p></div>
    </div>
    <div class="card-footer">
      <span class="type-badge">${item.type}</span>
      <span class="pdf-badge">PDF</span>
      <a class="report-link" href="${item.url}" target="_blank">打开报告 PDF →</a>
    </div>`;
  return div;
}

function renderOverview() {
  const key = activeInd === 'all' ? 'all' : activeInd;
  const data = TRENDS[key] || TRENDS['all'];
  const grid = document.getElementById('overviewGrid');
  grid.innerHTML = data.map(t => `
    <div class="trend-item">
      <div class="trend-ind">${t.ind}</div>
      <div class="trend-bullet">
        ${t.lines.map(l => `<div class="trend-line"><div class="trend-dot ${t.color}"></div><span>${l}</span></div>`).join('')}
      </div>
    </div>`).join('');
  // overview标题随行业切换
  const titles = { all:'全行业近期趋势概览', 母婴:'🍼 母婴行业近期趋势', 宠物:'🐾 宠物行业近期趋势', 大健康:'💊 大健康近期趋势', 食品饮料:'🥤 食品饮料近期趋势' };
  document.querySelector('.overview-title').textContent = '📡 ' + (titles[activeInd] || titles.all);
}

function renderClientReports() {
  const container = document.getElementById('cardGrid');
  container.innerHTML = '';
  document.getElementById('noResults').style.display = 'none';

  // 只显示已披露的年报
  const disclosed = CLIENT_REPORTS.filter(r => r.status === '已披露');

  // Header banner — 只显示已披露数量
  const hdr = document.createElement('div');
  hdr.className = 'ann-header';
  hdr.innerHTML = `
    <div class="ann-header-icon">📋</div>
    <div class="ann-header-text">
      <h3>客户上市公司年报</h3>
      <p>从账户列表筛选出的上市公司客户 · 2025年年度报告</p>
    </div>
    <div class="ann-stats">
      <div><div class="ann-stat-val" style="color:#16a34a">${disclosed.length}</div><div class="ann-stat-label">已披露 PDF</div></div>
    </div>`;
  container.appendChild(hdr);

  // Cards — 只渲染已披露
  const grid = document.createElement('div');
  grid.className = 'ann-grid';
  disclosed.forEach(r => grid.appendChild(buildAnnCard(r)));
  container.appendChild(grid);
  document.getElementById('visibleCount').textContent = disclosed.length;
}

function buildAnnCard(r) {
  const card = document.createElement('div');
  card.className = `ann-card ${r.status === '已披露' ? 'disclosed' : 'pending'}`;
  const isPdf = r.status === '已披露';
  card.innerHTML = `
    <div class="ann-body">
      <div class="ann-top">
        <span class="ann-name">${r.name}</span>
        <span class="ann-code">${r.code}</span>
        <span class="ann-exchange">${r.exchange}</span>
        <span class="ann-badge ${isPdf ? 'disclosed' : 'pending'}">${isPdf ? '✅ 年报已发' : '⏳ 待披露'}</span>
      </div>
      <div class="ann-meta">
        <span class="ann-meta-item">行业：<span>${r.industry}</span></span>
        <span class="ann-meta-item">品类：<span>${r.cat}</span></span>
        <span class="ann-meta-item">营收：<span>${r.revenue}</span></span>
        <span class="ann-meta-item">增速：<span>${r.yoy}</span></span>
      </div>
      <div class="ann-summary">${r.summary}</div>
      <div class="ann-insight"><b>💡 对客 Insight：</b>${r.insight}</div>
    </div>
    <div class="ann-footer">
      <span class="ann-cat">${r.cat}</span>
      ${isPdf 
        ? `<a class="ann-link pdf" href="${r.url}" target="_blank">📄 下载年报 PDF →</a>`
        : `<a class="ann-link cninfo" href="${r.url}" target="_blank">🔗 巨潮资讯页面 →</a>`}
    </div>`;
  return card;
}

function switchToAnn(e) {
  e.preventDefault();
  activeInd = '客户年报';
  // 更新 nav-link 高亮
  document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
  document.getElementById('navAnnLink').classList.add('active');
  // 取消 tab-bar 里的选中状态
  document.querySelectorAll('[data-ind]').forEach(el => el.classList.remove('active'));
  applyFilters();
}

function setInd(el, val) {
  activeInd = val;
  document.querySelectorAll('[data-ind]').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  // 切回行业报告时恢复 nav 高亮
  document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
  document.querySelector('.nav-link[href="index.html"]').classList.add('active');
  applyFilters();
}

function applyFilters() {
  const isAnn = activeInd === '客户年报';
  const isGc  = activeInd === '友商GoodCase';
  document.getElementById('overviewBox').style.display = (isAnn || isGc) ? 'none' : '';
  document.querySelector('.tab-bar').style.display = (isAnn || isGc) ? 'none' : '';
  if (isAnn) {
    renderClientReports();
  } else if (isGc) {
    renderGoodCase();
  } else {
    renderCards();
    renderOverview();
  }
}
