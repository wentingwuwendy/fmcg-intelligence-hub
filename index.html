  .sidebar-box { background:white; border-radius:12px; border:1px solid var(--gray-border); overflow:hidden; }
  .sidebar-title { padding:10px 14px; font-size:11px; font-weight:700; color:var(--text-sub); text-transform:uppercase; letter-spacing:0.6px; border-bottom:1px solid var(--gray-border); background:var(--gray-bg); }

  .filter-item:last-child { border-bottom:none; }
  .filter-item:hover { background:var(--gray-bg); }
  .filter-item.active { background:var(--red-light); color:var(--red); font-weight:600; }
  .filter-count { margin-left:auto; font-size:11px; color:var(--text-sub); background:#f0f0f0; padding:1px 6px; border-radius:10px; }

  .filter-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  .hero-title { font-size:16px; font-weight:700; color:white; margin-bottom:12px; }
  .hero-points { display:flex; flex-direction:column; gap:7px; margin-bottom:14px; }
  .hero-point { display:flex; align-items:flex-start; gap:8px; font-size:13px; color:rgba(255,255,255,0.85); line-height:1.5; }
  .hero-dot { width:5px; height:5px; border-radius:50%; background:var(--red); margin-top:7px; flex-shrink:0; }
  .hero-tags { display:flex; flex-wrap:wrap; gap:6px; }
  .hero-tag { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.18); border-radius:20px; padding:3px 10px; font-size:11px; color:rgba(255,255,255,0.7); }
  .hero-tag.hot { background:rgba(255,36,66,0.2); border-color:rgba(255,36,66,0.35); color:#ff9aaa; }

  .report-card { background:white; border:1px solid var(--gray-border); border-radius:14px; overflow:hidden; transition:box-shadow 0.15s,transform 0.15s; }
  .report-card:hover { box-shadow:0 6px 24px rgba(0,0,0,0.09); transform:translateY(-1px); }

  .card-top { padding:16px 18px 12px; display:flex; gap:14px; align-items:flex-start; }
  .card-logo { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; color:white; }

  .logo-deloitte { background:#86bc25; }
  .logo-bcg { background:#1d3461; }
  .logo-iresearch { background:#e63329; }
  .logo-nielseniq { background:#00b2a9; }
  .logo-cbndata { background:#1a1a2e; }
  .logo-iimedia { background:#ff6600; }
  .logo-other { background:#555; }

  .card-meta { flex:1; min-width:0; }
  .card-institution { font-size:11px; font-weight:600; color:var(--text-sub); margin-bottom:3px; display:flex; align-items:center; gap:6px; }
  .card-date { font-size:10px; color:#aaa; background:#f0f0f0; padding:1px 7px; border-radius:8px; }
  .card-title { font-size:15px; font-weight:700; line-height:1.4; color:var(--text); margin-bottom:6px; }
  .card-tags { display:flex; flex-wrap:wrap; gap:4px; }
  .card-tag { font-size:10px; padding:2px 8px; border-radius:10px; background:#f0f0f0; color:var(--text-sub); border:1px solid var(--gray-border); }
  .card-tag.industry-tag { background:var(--red-light); color:var(--red); border-color:#ffccd3; font-weight:600; }

  .card-body { padding:0 18px 14px; border-top:1px solid var(--gray-border); }
  .card-summary { font-size:13px; line-height:1.75; color:#333; padding:12px 0 10px; }

  .findings { background:var(--insight-bg); border-left:3px solid #f0c040; border-radius:0 8px 8px 0; padding:10px 14px; margin-bottom:10px; }
  .findings-title { font-size:11px; font-weight:700; color:#b8860b; margin-bottom:6px; text-transform:uppercase; }
  .findings ul { margin:0 0 0 14px; }
  .findings li { font-size:12.5px; line-height:1.65; color:#444; margin-bottom:4px; }

  .sales-insight { background:#f0f4ff; border-left:3px solid #5c85d6; border-radius:0 8px 8px 0; padding:10px 14px; }
  .sales-insight-title { font-size:11px; font-weight:700; color:#1565c0; margin-bottom:5px; text-transform:uppercase; }
  .sales-insight p { font-size:12.5px; line-height:1.65; color:#333; }

  .card-footer { padding:10px 18px; border-top:1px solid var(--gray-border); background:var(--gray-bg); display:flex; align-items:center; }
  .type-badge { background:var(--red-light); color:var(--red); padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .report-link { margin-left:auto; color:var(--red); text-decoration:none; font-size:12px; font-weight:600; padding:4px 12px; border:1px solid #ffccd3; border-radius:20px; background:var(--red-light); }
  .report-link:hover { background:var(--red); color:white; }

  .no-results { text-align:center; padding:80px 20px; color:var(--text-sub); }

  @media(max-width:768px) { .sidebar{display:none;} .layout{padding:12px;} }
</style>

// ══ STATE ══
let activeInst='all', activeType='all', activeInd='all';

// ══ RENDER ══
function renderCards() {
  const container=document.getElementById('cardGrid');
  container.innerHTML='';
  const query=document.getElementById('searchInput').value.trim().toLowerCase();
  let visible=0;
  const instCnt={all:0,'毕马威':0,'德勤':0,'BCG':0,'艾瑞':0,'尼尔森':0,'CBNData':0,'其他':0};
  const typeCnt={all:0,'市场规模':0,'消费者洞察':0,'行业趋势':0,'竞争格局':0,'细分赛道':0,'渠道变革':0};

  REPORTS.forEach(item => {
    instCnt.all++;
    if(instCnt[item.instKey]!==undefined) instCnt[item.instKey]++;
    else instCnt['其他']++;
    typeCnt.all++;
    if(typeCnt[item.type]!==undefined) typeCnt[item.type]++;

    const instMatch=activeInst==='all'||item.instKey===activeInst;
    const typeMatch=activeType==='all'||item.type===activeType;
    const indMatch=activeInd==='all'||item.industry.includes(activeInd);
    const srch=(item.title+item.institution+item.summary+(item.tags||[]).join(' ')).toLowerCase();
    const searchMatch=!query||srch.includes(query);

    if(instMatch&&typeMatch&&indMatch&&searchMatch){
      visible++;
      container.appendChild(buildCard(item));
    }
  });

  Object.keys(instCnt).forEach(k=>{const el=document.getElementById('cnt-inst-'+k);if(el)el.textContent=instCnt[k];});
  Object.keys(typeCnt).forEach(k=>{const el=document.getElementById('cnt-type-'+k);if(el)el.textContent=typeCnt[k];});
  document.getElementById('visibleCount').textContent=visible;
  document.getElementById('noResults').style.display=visible===0?'block':'none';
}

function buildCard(item){
  const div=document.createElement('div');
  div.className='report-card';
  const indTags=item.industry.map(i=>`<span class="card-tag industry-tag">${i}</span>`).join('');
  const otherTags=(item.tags||[]).slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('');
  const findingsHtml=(item.findings||[]).map(f=>`<li>${f}</li>`).join('');
  div.innerHTML=`
    <div class="card-top">
      <div class="card-logo ${item.instClass}">${item.instShort}</div>
      <div class="card-meta">
        <div class="card-institution">${item.institution}<span class="card-date">${item.date}</span></div>
        <div class="card-title">${item.title}</div>
        <div class="card-tags">${indTags}${otherTags}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-summary">${item.summary}</div>
      <div class="findings">
        <div class="findings-title">📊 核心结论</div>
        <ul>${findingsHtml}</ul>
      </div>
      <div class="sales-insight">
        <div class="sales-insight-title">💡 给销售的Insight</div>
        <p>${item.salesInsight}</p>
      </div>
    </div>
    <div class="card-footer">
      <span class="type-badge">${item.type}</span>
      <a class="report-link" href="${item.url}" target="_blank">查看报告 →</a>
    </div>`;
  return div;
}
