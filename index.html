<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快消客户情报周报 | 策略中台</title>
<style>
  :root {
    --red: #FF2442;
    --red-light: #fff0f2;
    --gray-bg: #f5f5f7;
    --gray-border: #e0e0e0;
    --text: #1a1a1a;
    --text-sub: #666;
    --tag-bg: #f0f0f0;
    --insight-bg: #fffbf0;
    --action-bg: #f0f8f0;
    --cross-bg: #f0f4ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--gray-bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: white;
    border-bottom: 1px solid var(--gray-border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 56px;
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    color: var(--red);
    white-space: nowrap;
  }
  .period {
    font-size: 12px;
    color: var(--text-sub);
    background: var(--gray-bg);
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .search-wrap {
    flex: 1;
    max-width: 320px;
  }
  .search-wrap input {
    width: 100%;
    padding: 6px 12px;
    border: 1px solid var(--gray-border);
    border-radius: 20px;
    font-size: 13px;
    outline: none;
    background: var(--gray-bg);
  }
  .search-wrap input:focus { border-color: var(--red); background: white; }

  .stats {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-sub);
    white-space: nowrap;
  }
  .stats span { color: var(--red); font-weight: 600; }

  /* ── Layout ── */
  .layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 16px;
    gap: 20px;
    align-items: flex-start;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    position: sticky;
    top: 76px;
  }
  .sidebar-section {
    background: white;
    border-radius: 10px;
    border: 1px solid var(--gray-border);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .sidebar-title {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--gray-border);
    background: var(--gray-bg);
  }
  .filter-item {
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--gray-border);
    transition: background 0.1s;
  }
  .filter-item:last-child { border-bottom: none; }
  .filter-item:hover { background: var(--gray-bg); }
  .filter-item.active { background: var(--red-light); color: var(--red); font-weight: 600; }
  .filter-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-sub);
    background: var(--tag-bg);
    padding: 1px 6px;
    border-radius: 10px;
  }
  .filter-item.active .filter-count { background: var(--red); color: white; }

  /* Category colors */
  .dot-财务营收 { background: #4CAF50; }
  .dot-投融资   { background: #2196F3; }
  .dot-企业动态 { background: #FF9800; }
  .dot-新品     { background: #9C27B0; }
  .dot-行业政策 { background: #F44336; }
  .dot-会展     { background: #00BCD4; }

  /* ── Main content ── */
  .main { flex: 1; min-width: 0; }

  /* Industry group bar */
  .group-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .group-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--gray-border);
    background: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    color: var(--text-sub);
  }
  .group-btn:hover { border-color: var(--red); color: var(--red); }
  .group-btn.active {
    background: var(--red);
    color: white;
    border-color: var(--red);
    font-weight: 700;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-sub);
    font-size: 14px;
  }

  /* ── News Card ── */
  .news-card {
    background: white;
    border: 1px solid var(--gray-border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .news-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .news-card.hidden { display: none; }

  .card-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--gray-border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .cat-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .badge-财务营收 { background: #e8f5e9; color: #2e7d32; }
  .badge-投融资   { background: #e3f2fd; color: #1565c0; }
  .badge-企业动态 { background: #fff3e0; color: #e65100; }
  .badge-新品     { background: #f3e5f5; color: #6a1b9a; }
  .badge-行业政策 { background: #ffebee; color: #c62828; }
  .badge-会展     { background: #e0f7fa; color: #00695c; }

  .card-title-wrap { flex: 1; }
  .card-company {
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 2px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }
  .tag {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 10px;
    background: var(--tag-bg);
    color: var(--text-sub);
    border: 1px solid var(--gray-border);
  }
  .tag.client-tag {
    background: var(--red-light);
    color: var(--red);
    border-color: #ffccd3;
    font-weight: 500;
  }

  .card-body { padding: 12px 16px; }
  .card-summary {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 10px;
  }

  /* Collapsible sections */
  .section-toggle {
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 6px;
    margin-top: 8px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .section-toggle .arrow {
    display: inline-block;
    transition: transform 0.2s;
    font-size: 10px;
  }
  .section-toggle.open .arrow { transform: rotate(90deg); }

  .toggle-insight { color: #b8860b; }
  .toggle-cross   { color: #1565c0; }
  .toggle-action  { color: #2e7d32; }

  .collapsible { display: none; margin-top: 4px; }
  .collapsible.open { display: block; }

  .insight-box {
    background: var(--insight-bg);
    border-left: 3px solid #f0c040;
    border-radius: 0 6px 6px 0;
    padding: 10px 12px;
    font-size: 12.5px;
    line-height: 1.7;
  }
  .cross-box {
    background: var(--cross-bg);
    border-left: 3px solid #5c85d6;
    border-radius: 0 6px 6px 0;
    padding: 10px 12px;
    font-size: 12.5px;
    line-height: 1.7;
  }
  .action-box {
    background: var(--action-bg);
    border-left: 3px solid #4CAF50;
    border-radius: 0 6px 6px 0;
    padding: 10px 12px;
    font-size: 12.5px;
    line-height: 1.7;
  }
  .action-box ul, .insight-box ul, .cross-box ul {
    margin: 4px 0 0 16px;
  }
  .action-box li, .insight-box li, .cross-box li {
    margin-bottom: 4px;
  }

  .card-footer {
    padding: 8px 16px;
    border-top: 1px solid var(--gray-border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-sub);
    background: var(--gray-bg);
  }
  .card-footer a {
    color: var(--red);
    text-decoration: none;
    margin-left: auto;
  }
  .card-footer a:hover { text-decoration: underline; }

  /* Group tags in footer */
  .group-tag {
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    background: var(--gray-border);
    color: var(--text-sub);
  }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .layout { padding: 12px; }
    header { gap: 12px; }
    .stats { display: none; }
  }
</style>
</head>

<header>
  <div class="logo">📊 快消行策</div>

  <div class="stats">共 <span id="visibleCount">0</span> 条情报</div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- Category filter -->
    <div class="sidebar-section">
      <div class="sidebar-title">分类筛选</div>

      <div class="filter-item" data-cat="投融资" onclick="setCat(this,'投融资')">
        <span class="filter-dot dot-投融资"></span>投融资
        <span class="filter-count" id="cnt-投融资">0</span>

      <div class="filter-item" data-cat="企业动态" onclick="setCat(this,'企业动态')">

      </div>
      <div class="filter-item" data-cat="会展" onclick="setCat(this,'会展')">
        <span class="filter-dot dot-会展"></span>会展
        <span class="filter-count" id="cnt-会展">0</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Group buttons -->
    <div class="group-bar">
      <button class="group-btn active" data-group="all" onclick="setGroup(this,'all')">全部</button>
      <button class="group-btn" data-group="母婴宠物" onclick="setGroup(this,'母婴宠物')">母婴·宠物</button>
      <button class="group-btn" data-group="大健康" onclick="setGroup(this,'大健康')">大健康</button>
      <button class="group-btn" data-group="食品饮料" onclick="setGroup(this,'食品饮料')">食品饮料</button>

    <!-- Cards container -->
    <div id="cardContainer"></div>
    <div id="noResults" class="no-results" style="display:none">
      暂无符合条件的情报
    </div>
  </main>
</div>

    title: "两大行业展会本周开幕：Foodaily（4月·无锡）招募中，FIC2026（3月·上海）已开幕",
    summary: "FIC2026已于3月17日在上海开幕，聚焦女性健康/银发经济/情绪食品/运动营养/口服抗衰五大趋势；Foodaily创新博览会4月15-17日无锡开幕，无限极、诺特兰德、励成医学营养、满记甜品、广州酒家、周黑鸭等客户已确认参展。",
    insight: "FIC是B端展会，反映未来1-2年食品原料创新走向，五大趋势与小红书用户圈层高度重合。Foodaily博览会参展客户覆盖多个销售组，是4月前拜访的好理由。",
    crossIndustry: "FIC和Foodaily博览会同时覆盖食品饮料和大健康两大行业。情绪食品/口服抗衰是跨二组+三组+八组的内容主题。",
    actions: ["话术：「你们4月去Foodaily博览会吗？我们可以聊聊现场的内容合作方案。」", "话术：「FIC上情绪食品是大热点，你们有没有这个方向的布局？」"],
    groups: ["行业二组", "行业三组", "行业四组", "行业六组", "行业七组", "行业八组"],
    clients: ["无限极", "诺特兰德", "励成医学营养", "满记甜品", "广州酒家", "周黑鸭"],
    source: "https://foodaily.com/articles/41414",
    date: "2026-03-17"
  }
];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let activeCat = 'all';
let activeGroup = 'all';

// 行业 -> 包含的组
const INDUSTRY_MAP = {
  '母婴宠物': ['行业一组', '行业五组', '行业十组'],
  '大健康':   ['行业二组', '行业七组'],
  '食品饮料': ['行业三组', '行业四组', '行业六组', '行业八组', '行业九组'],
};

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function renderCards() {
  const container = document.getElementById('cardContainer');
  container.innerHTML = '';

  const query = document.getElementById('searchInput').value.trim().toLowerCase();

  let visible = 0;
  const catCounts = { all: 0, '财务营收': 0, '投融资': 0, '企业动态': 0, '新品': 0, '行业政策': 0, '会展': 0 };

  NEWS.forEach(item => {
    // Group filter: 支持行业聚合（母婴宠物/大健康/食品饮料）
    let groupMatch;
    if (activeGroup === 'all') {
      groupMatch = true;
    } else if (INDUSTRY_MAP[activeGroup]) {
      groupMatch = item.groups.some(g => INDUSTRY_MAP[activeGroup].includes(g));
    } else {
      groupMatch = item.groups.includes(activeGroup);
    }
    // Category filter
    const catMatch = activeCat === 'all' || item.category === activeCat;
    // Search filter
    const searchStr = (item.company + item.title + item.summary + item.clients.join(' ')).toLowerCase();
    const searchMatch = !query || searchStr.includes(query);

    if (groupMatch && searchMatch) {
      catCounts.all++;
      catCounts[item.category] = (catCounts[item.category] || 0) + 1;
    }

    if (!groupMatch || !catMatch || !searchMatch) return;

    visible++;
    const card = buildCard(item);
    container.appendChild(card);
  });

  // Update counts
  Object.keys(catCounts).forEach(cat => {
    const el = document.getElementById('cnt-' + cat);
    if (el) el.textContent = catCounts[cat];
  });

  document.getElementById('visibleCount').textContent = visible;
  document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
}

function buildCard(item) {
  const card = document.createElement('div');
  card.className = 'news-card';

  // Client tags
  const clientTagsHtml = item.clients.length
    ? item.clients.map(c => `<span class="tag client-tag">📌 ${c}</span>`).join('')
    : '';

  // Group tags
  const groupTagsHtml = item.groups.map(g => {
    const short = g.replace(/行业(.+)组（快消-.+）/, '$1组');
    return `<span class="group-tag">${short}</span>`;
  }).join('');

  card.innerHTML = `
    <div class="card-header">
      <span class="cat-badge badge-${item.category}">${item.category}</span>
      <div class="card-title-wrap">
        <div class="card-company">${item.company}</div>
        <div class="card-title">${item.title}</div>
        ${item.clients.length ? `<div class="card-tags">${clientTagsHtml}</div>` : ''}
      </div>
    </div>
    <div class="card-body">
      <div class="card-summary">${item.summary}</div>

      <button class="section-toggle toggle-insight" onclick="toggleSection(this)">
        <span class="arrow">▶</span> 💡 Key Insight
      </button>
      <div class="collapsible">
        <div class="insight-box">${item.insight}</div>
      </div>

      <button class="section-toggle toggle-cross" onclick="toggleSection(this)">
        <span class="arrow">▶</span> 🔗 行业交叉视角
      </button>
      <div class="collapsible">
        <div class="cross-box">${item.crossIndustry}</div>
      </div>

      <button class="section-toggle toggle-action" onclick="toggleSection(this)">
        <span class="arrow">▶</span> 🎯 销售建议 & 话术
      </button>
      <div class="collapsible">
        <div class="action-box">
          <ul>${item.actions.map(a => `<li>${a}</li>`).join('')}</ul>
        </div>
      </div>
    </div>
    <div class="card-footer">
      ${groupTagsHtml}
      <span style="margin-left:4px;color:#bbb">·</span>
      <span>${item.date}</span>
      <a href="${item.source}" target="_blank">查看原文 →</a>
    </div>
  `;
  return card;
}

function toggleSection(btn) {
  btn.classList.toggle('open');
  const next = btn.nextElementSibling;
  next.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════
function setCat(el, cat) {
  activeCat = cat;
  document.querySelectorAll('[data-cat]').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function setGroup(el, group) {
  activeGroup = group;
  document.querySelectorAll('[data-group]').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() { renderCards(); }

// Init
renderCards();
</script>
</body>
</html>
