<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快消客户情报周报 | 策略中台</title>
<style>
  :root {
    --red: #FF2442;
    --red-light: #fff0f2;
    --gray-bg: #f5f5f7;
    --gray-border: #e0e0e0;
    --text: #1a1a1a;
    --text-sub: #666;
    --tag-bg: #f0f0f0;
    --insight-bg: #fffbf0;
    --action-bg: #f0f8f0;
    --cross-bg: #f0f4ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--gray-bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: white;
    border-bottom: 1px solid var(--gray-border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 56px;
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    color: var(--red);
    white-space: nowrap;
  }
  .period {
    font-size: 12px;
    color: var(--text-sub);
    background: var(--gray-bg);
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .search-wrap {
    flex: 1;
    max-width: 320px;
  }
  .search-wrap input {
    width: 100%;
    padding: 6px 12px;
    border: 1px solid var(--gray-border);
    border-radius: 20px;
    font-size: 13px;
    outline: none;
    background: var(--gray-bg);
  }
  .search-wrap input:focus { border-color: var(--red); background: white; }

  .stats {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-sub);
    white-space: nowrap;
  }
  .stats span { color: var(--red); font-weight: 600; }

  /* ── Layout ── */
  .layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 16px;
    gap: 20px;
    align-items: flex-start;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    position: sticky;
    top: 76px;
  }
  .sidebar-section {
    background: white;
    border-radius: 10px;
    border: 1px solid var(--gray-border);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .sidebar-title {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--gray-border);
    background: var(--gray-bg);
  }
  .filter-item {
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--gray-border);
    transition: background 0.1s;
  }
  .filter-item:last-child { border-bottom: none; }
  .filter-item:hover { background: var(--gray-bg); }
  .filter-item.active { background: var(--red-light); color: var(--red); font-weight: 600; }
  .filter-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-sub);
    background: var(--tag-bg);
    padding: 1px 6px;
    border-radius: 10px;
  }
  .filter-item.active .filter-count { background: var(--red); color: white; }

  /* Category colors */
  .dot-财务营收 { background: #4CAF50; }
  .dot-投融资   { background: #2196F3; }
  .dot-企业动态 { background: #FF9800; }
  .dot-新品     { background: #9C27B0; }
  .dot-行业政策 { background: #F44336; }
  .dot-会展     { background: #00BCD4; }

  /* ── Main content ── */
  .main { flex: 1; min-width: 0; }

  /* Industry group bar */
  .group-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .group-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--gray-border);
    background: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    color: var(--text-sub);
  }
  .group-btn:hover { border-color: var(--red); color: var(--red); }
  .group-btn.active {
    background: var(--red);
    color: white;
    border-color: var(--red);
    font-weight: 700;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-sub);
    font-size: 14px;
  }

  /* ── News Card ── */
  .news-card {
    background: white;
    border: 1px solid var(--gray-border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .news-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .news-card.hidden { display: none; }

  .card-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--gray-border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .cat-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .badge-财务营收 { background: #e8f5e9; color: #2e7d32; }
  .badge-投融资   { background: #e3f2fd; color: #1565c0; }
  .badge-企业动态 { background: #fff3e0; color: #e65100; }
  .badge-新品     { background: #f3e5f5; color: #6a1b9a; }
  .badge-行业政策 { background: #ffebee; color: #c62828; }
  .badge-会展     { background: #e0f7fa; color: #00695c; }

  .card-title-wrap { flex: 1; }
  .card-company {
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 2px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }
  .tag {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 10px;
    background: var(--tag-bg);
    color: var(--text-sub);
    border: 1px solid var(--gray-border);
  }
  .tag.client-tag {
    background: var(--red-light);
    color: var(--red);
    border-color: #ffccd3;
    font-weight: 500;
  }

  .card-body { padding: 12px 16px; }
  .card-summary {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 10px;
  }

  /* Collapsible sections */
  .section-toggle {
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 6px;
    margin-top: 8px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .section-toggle .arrow {
    display: inline-block;
    transition: transform 0.2s;
    font-size: 10px;
  }
  .section-toggle.open .arrow { transform: rotate(90deg); }

  .toggle-insight { color: #b8860b; }
  .toggle-cross   { color: #1565c0; }
  .toggle-action  { color: #2e7d32; }

  .collapsible { display: none; margin-top: 4px; }
  .collapsible.open { display: block; }

  .insight-box {
    background: var(--insight-bg);
    border-left: 3px solid #f0c040;
    border-radius: 0 6px 6px 0;
    padding: 10px 12px;
    font-size: 12.5px;
    line-height: 1.7;
  }
  .cross-box {
    background: var(--cross-bg);
    border-left: 3px solid #5c85d6;
    border-radius: 0 6px 6px 0;
    padding: 10px 12px;
    font-size: 12.5px;
    line-height: 1.7;
  }
  .action-box {
    background: var(--action-bg);
    border-left: 3px solid #4CAF50;
    border-radius: 0 6px 6px 0;
    padding: 10px 12px;
    font-size: 12.5px;
    line-height: 1.7;
  }
  .action-box ul, .insight-box ul, .cross-box ul {
    margin: 4px 0 0 16px;
  }
  .action-box li, .insight-box li, .cross-box li {
    margin-bottom: 4px;
  }

  .card-footer {
    padding: 8px 16px;
    border-top: 1px solid var(--gray-border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-sub);
    background: var(--gray-bg);
  }
  .card-footer a {
    color: var(--red);
    text-decoration: none;
    margin-left: auto;
  }
  .card-footer a:hover { text-decoration: underline; }

  /* Group tags in footer */
  .group-tag {
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    background: var(--gray-border);
    color: var(--text-sub);
  }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .layout { padding: 12px; }
    header { gap: 12px; }
    .stats { display: none; }
  }
</style>
</head>

  </main>
</div>

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let activeCat = 'all';
let activeGroup = 'all';

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function renderCards() {
  const container = document.getElementById('cardContainer');
  container.innerHTML = '';

  const query = document.getElementById('searchInput').value.trim().toLowerCase();

  let visible = 0;
  const catCounts = { all: 0, '财务营收': 0, '投融资': 0, '企业动态': 0, '新品': 0, '行业政策': 0, '会展': 0 };

  NEWS.forEach(item => {
    // Group filter
    const groupMatch = activeGroup === 'all' || item.groups.includes(activeGroup);
    // Category filter
    const catMatch = activeCat === 'all' || item.category === activeCat;
    // Search filter
    const searchStr = (item.company + item.title + item.summary + item.clients.join(' ')).toLowerCase();
    const searchMatch = !query || searchStr.includes(query);

    if (groupMatch && searchMatch) {
      catCounts.all++;
      catCounts[item.category] = (catCounts[item.category] || 0) + 1;
    }

    if (!groupMatch || !catMatch || !searchMatch) return;

    visible++;
    const card = buildCard(item);
    container.appendChild(card);
  });

  // Update counts
  Object.keys(catCounts).forEach(cat => {
    const el = document.getElementById('cnt-' + cat);
    if (el) el.textContent = catCounts[cat];
  });

  document.getElementById('visibleCount').textContent = visible;
  document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
}

function buildCard(item) {
  const card = document.createElement('div');
  card.className = 'news-card';

  // Client tags
  const clientTagsHtml = item.clients.length
    ? item.clients.map(c => `<span class="tag client-tag">📌 ${c}</span>`).join('')
    : '';

  // Group tags
  const groupTagsHtml = item.groups.map(g => {
    const short = g.replace(/行业(.+)组（快消-.+）/, '$1组');
    return `<span class="group-tag">${short}</span>`;
  }).join('');

  card.innerHTML = `
    <div class="card-header">
      <span class="cat-badge badge-${item.category}">${item.category}</span>
      <div class="card-title-wrap">
        <div class="card-company">${item.company}</div>
        <div class="card-title">${item.title}</div>
        ${item.clients.length ? `<div class="card-tags">${clientTagsHtml}</div>` : ''}
      </div>
    </div>
    <div class="card-body">
      <div class="card-summary">${item.summary}</div>

      <button class="section-toggle toggle-insight" onclick="toggleSection(this)">
        <span class="arrow">▶</span> 💡 Key Insight
      </button>
      <div class="collapsible">
        <div class="insight-box">${item.insight}</div>
      </div>

      <button class="section-toggle toggle-cross" onclick="toggleSection(this)">
        <span class="arrow">▶</span> 🔗 行业交叉视角
      </button>
      <div class="collapsible">
        <div class="cross-box">${item.crossIndustry}</div>
      </div>

      <button class="section-toggle toggle-action" onclick="toggleSection(this)">
        <span class="arrow">▶</span> 🎯 销售建议 & 话术
      </button>
      <div class="collapsible">
        <div class="action-box">
          <ul>${item.actions.map(a => `<li>${a}</li>`).join('')}</ul>
        </div>
      </div>
    </div>
    <div class="card-footer">
      ${groupTagsHtml}
      <span style="margin-left:4px;color:#bbb">·</span>
      <span>${item.date}</span>
      <a href="${item.source}" target="_blank">查看原文 →</a>
    </div>
  `;
  return card;
}

function toggleSection(btn) {
  btn.classList.toggle('open');
  const next = btn.nextElementSibling;
  next.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════
function setCat(el, cat) {
  activeCat = cat;
  document.querySelectorAll('[data-cat]').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function setGroup(el, group) {
  activeGroup = group;
  document.querySelectorAll('[data-group]').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() { renderCards(); }

// Init
renderCards();
